name: CI/CD

on:
  pull_request:
    paths:
      - "java-assignment/**"
      - ".github/workflows/ci-cd.yml"
  push:
    branches:
      - main
    paths:
      - "java-assignment/**"
      - ".github/workflows/ci-cd.yml"
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java-assignment
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run unit and integration tests
        run: |
          chmod +x ./mvnw
          ./mvnw -Dtest='*Test,*IT' test

      - name: Enforce JaCoCo line coverage >= 80%
        run: |
          coverage=$(awk -F, 'NR>1 {miss+=$8; cov+=$9} END {total=miss+cov; if (total==0) {printf "0.00"} else {printf "%.2f", (cov/total)*100}}' target/jacoco-report/jacoco.csv)
          echo "JaCoCo line coverage: ${coverage}%"
          awk -v coverage="$coverage" 'BEGIN { exit (coverage + 0 >= 80 ? 0 : 1) }'

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: java-assignment/target/surefire-reports
          retention-days: 14

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: java-assignment/target/jacoco-report
          retention-days: 14

  package:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    defaults:
      run:
        working-directory: java-assignment
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build artifact
        run: |
          chmod +x ./mvnw
          ./mvnw -DskipTests package

      - name: Upload packaged jar
        uses: actions/upload-artifact@v4
        with:
          name: java-code-assignment-jar
          path: java-assignment/target/java-code-assignment-*.jar
          retention-days: 14
